<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Last Assylum: Plague Violation Tracker{% endblock %}</title>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css?v=plague-20260425">
  <script src="/static/i18n.js?v=20260517" defer></script>
</head>
<body>
<header class="site-header">
  <div class="wrap nav-row">
    <h1><a href="/">Last Assylum: Plague Violation Tracker</a></h1>
    <div class="nav-tools">
      <nav class="utility-nav" aria-label="Utilities">
        <a href="/attacks/new">Add</a>
        <a href="/manual">Docs</a>
      </nav>
      <label class="language-switcher">
        <span>Language</span>
        <select id="language-select" aria-label="Language">
          <option value="auto">Auto</option>
          <option value="en-US">EN-US</option>
          <option value="en-AU">EN-AU</option>
          <option value="fr">FR</option>
          <option value="es">ES</option>
          <option value="pt">PT</option>
        </select>
      </label>
    </div>
    <nav class="primary-nav">
      <a href="/">Dashboard</a>
      <a href="/players">Players</a>
      <a href="/stats">Stats</a>
      <a href="/analytics">Analytics</a>
      <a href="/alliances">Alliances</a>
    </nav>
  </div>
</header>
<main class="wrap">
  {% block content %}{% endblock %}
</main>
<script>
  function confirmDeleteWithPassword(form) {
    const password = window.prompt("Enter delete password");
    if (password === null) {
      return false;
    }
    const field = form.querySelector("input[name='delete_password']");
    if (field) {
      field.value = password;
    }
    return window.confirm("Delete this attack?");
  }
</script>
</body>
</html>
